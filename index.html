<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINAL_THAY_DETECTADO</title>
    <!-- Tailwind CSS apenas para posicionamento básico -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        
        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: #020503;
            color: #00ff66;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        /* Título e elementos centrais em fonte sci-fi moderna */
        .title-font {
            font-family: 'Orbitron', sans-serif;
        }

        /* Scanlines de monitor CRT clássico para textura retrô */
        .crt-scanlines::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 99;
        }

        /* Vinheta radial profunda para focar os olhos no centro */
        .vignette {
            background: radial-gradient(circle, rgba(2, 5, 3, 0.1) 20%, rgba(1, 3, 2, 0.98) 100%);
            pointer-events: none;
        }
    </style>
</head>
<body class="relative w-screen h-screen crt-scanlines bg-[#020503] select-none overflow-hidden flex items-center justify-center">

    <div class="vignette absolute inset-0 z-30"></div>
    
    <!-- Canvas que cobre toda a tela -->
    <canvas id="quantumCanvas" class="absolute inset-0 w-full h-full z-20 cursor-crosshair"></canvas>

    <!-- Anéis orbitais finos ao redor do nome central -->
    <div class="absolute border border-[#00ff66]/5 rounded-full w-[380px] h-[380px] pointer-events-none animate-spin z-10" style="animation-duration: 25s;"></div>
    <div class="absolute border border-dashed border-[#00ff66]/10 rounded-full w-[260px] h-[260px] pointer-events-none animate-spin z-10" style="animation-duration: 15s; animation-direction: reverse;"></div>

    <script>
        const canvas = document.getElementById('quantumCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        // Redimensionamento inteligente do canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let mouse = { 
            x: canvas.width / 2, 
            y: canvas.height / 2, 
            active: false, 
            targetX: canvas.width / 2, 
            targetY: canvas.height / 2 
        };

        function updateMouseCoords(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            mouse.targetX = clientX;
            mouse.targetY = clientY;
            mouse.active = true;
        }

        window.addEventListener('mousemove', updateMouseCoords);
        window.addEventListener('touchmove', updateMouseCoords, { passive: true });
        window.addEventListener('touchstart', (e) => {
            updateMouseCoords(e);
            mouse.x = mouse.targetX;
            mouse.y = mouse.targetY;
        }, { passive: true });
        window.addEventListener('mouseleave', () => { mouse.active = false; });
        window.addEventListener('touchend', () => { mouse.active = false; });

        // Pool de caracteres ASCII verdes
        const asciiCharacters = [
            '♥', '∞', 'L', 'O', 'V', 'E', 'T', 'H', 'A', 'Y', 'M', 'O', 'R', '1', '0', 'ψ', 'φ', '✦', '⚛'
        ];

        // Total otimizado de partículas para fluidez de 60fps
        const particleCount = 1400; 
        const heartTargetsPrecalculated = new Float32Array(particleCount * 2);

        function precalculateHeartTargets() {
            for (let i = 0; i < particleCount; i++) {
                const angle = (i / particleCount) * Math.PI * 2;
                
                // Fórmula clássica do coração
                const x = 16 * Math.pow(Math.sin(angle), 3);
                const y = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
                
                heartTargetsPrecalculated[i * 2] = x;
                heartTargetsPrecalculated[i * 2 + 1] = y;
            }
        }
        precalculateHeartTargets();

        const particles = [];

        class QuantumParticle {
            constructor(index, discreteSize) {
                this.index = index;
                this.reset(true);
                this.char = asciiCharacters[index % asciiCharacters.length];
                this.size = discreteSize; 
                this.glowOffset = Math.random() * Math.PI * 2;
                
                // Vetores do mapa de atração
                this.targetXOffset = heartTargetsPrecalculated[index * 2];
                this.targetYOffset = heartTargetsPrecalculated[index * 2 + 1];
            }

            reset(fullReset = false) {
                if (fullReset) {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                } else {
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.min(canvas.width, canvas.height) * 0.8;
                    this.x = canvas.width / 2 + Math.cos(angle) * r;
                    this.y = canvas.height / 2 + Math.sin(angle) * r;
                }
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.alpha = 0.2 + Math.random() * 0.8;
                this.speedLimit = 4 + Math.random() * 3;
            }

            update(centerX, centerY, scale, pulse) {
                const targetFactor = scale * pulse;
                const targetX = centerX + this.targetXOffset * targetFactor;
                const targetY = centerY + this.targetYOffset * targetFactor;

                let dx = targetX - this.x;
                let dy = targetY - this.y;
                let distSq = dx * dx + dy * dy;

                let gravityConstant = 0.009;
                let fluidOrbitForce = 0.0025;
                let drag = 0.94;

                this.vx += dx * gravityConstant;
                this.vy += dy * gravityConstant;

                // Efeito orbital sutil de vórtice
                const dist = Math.sqrt(distSq) + 1;
                const ox = -dy / dist;
                const oy = dx / dist;
                this.vx += ox * dist * fluidOrbitForce;
                this.vy += oy * dist * fluidOrbitForce;

                // Atração gravitacional interativa do cursor/toque
                if (mouse.active) {
                    const mdx = this.x - mouse.x;
                    const mdy = this.y - mouse.y;
                    const mdistSq = mdx * mdx + mdy * mdy;

                    if (mdistSq < 48400) { // Raio de efeito
                        const mdist = Math.sqrt(mdistSq) + 0.01;
                        const lensForce = (220 - mdist) / 220;
                        
                        const mox = -mdy / mdist;
                        const moy = mdx / mdist;

                        this.vx += mox * lensForce * 6;
                        this.vy += moy * lensForce * 6;
                        
                        this.vx += (mdx / mdist) * lensForce * 2;
                        this.vy += (mdy / mdist) * lensForce * 2;
                    }
                }

                this.vx *= drag;
                this.vy *= drag;

                // Limite de velocidade de segurança para manter o desenho
                const currentSpeedSq = this.vx * this.vx + this.vy * this.vy;
                if (currentSpeedSq > this.speedLimit * this.speedLimit) {
                    const currentSpeed = Math.sqrt(currentSpeedSq);
                    this.vx = (this.vx / currentSpeed) * this.speedLimit;
                    this.vy = (this.vy / currentSpeed) * this.speedLimit;
                }

                this.x += this.vx;
                this.y += this.vy;

                if (this.x < -100 || this.x > canvas.width + 100 || this.y < -100 || this.y > canvas.height + 100) {
                    this.reset(false);
                }
            }

            draw(ctx, time) {
                const blink = Math.sin(time * 5 + this.glowOffset) * 0.3 + 0.7;
                const dynamicAlpha = this.alpha * blink;

                const energy = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const colorTone = Math.min(255, Math.floor(110 + energy * 25));

                ctx.fillStyle = `rgba(${255 - colorTone}, 255, ${200 - colorTone}, ${dynamicAlpha})`;
                ctx.fillText(this.char, this.x, this.y);

                // Emaranhamento de partículas próximas (linhas de conexão sutis)
                if (this.index % 16 === 0) {
                    const nextParticle = particles[(this.index + 16) % particleCount];
                    const ndx = nextParticle.x - this.x;
                    const ndy = nextParticle.y - this.y;
                    const distToNextSq = ndx * ndx + ndy * ndy;

                    if (distToNextSq < 5625) { // 75 * 75
                        const distToNext = Math.sqrt(distToNextSq);
                        ctx.strokeStyle = `rgba(0, 255, 102, ${(1 - distToNext / 75) * 0.12})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(this.x, this.y);
                        ctx.lineTo(nextParticle.x, nextParticle.y);
                        ctx.stroke();
                    }
                }
            }
        }

        const sizes = [7, 10, 13];
        for (let i = 0; i < particleCount; i++) {
            const discreteSize = sizes[i % sizes.length];
            particles.push(new QuantumParticle(i, discreteSize));
        }

        // Ordenação por tamanho para evitar chamadas de alteração de fonte excessivas
        particles.sort((a, b) => a.size - b.size);

        let lerpX = canvas.width / 2;
        let lerpY = canvas.height / 2;
        let time = 0;

        function animate() {
            // Fundo escuro com persistência leve de rastro (motion blur)
            ctx.fillStyle = 'rgba(2, 5, 3, 0.22)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            time += 0.01;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Escala do coração baseada na dimensão da tela
            const baseScale = Math.min(canvas.width, canvas.height) * 0.021;

            // Pulsação de batimentos cardíacos duplos realista
            const heartBeatTime = time * 2.8;
            const pulse = 1 + (Math.pow(Math.sin(heartBeatTime), 2) * Math.pow(Math.cos(heartBeatTime), 4) * 0.28);

            // Suavização do movimento do mouse para interações orgânicas
            lerpX += (mouse.targetX - lerpX) * 0.08;
            lerpY += (mouse.targetY - lerpY) * 0.08;

            let currentSize = 0;
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.update(centerX, centerY, baseScale, pulse);
                
                if (p.size !== currentSize) {
                    currentSize = p.size;
                    ctx.font = `${currentSize}px 'Orbitron', monospace`;
                }

                p.draw(ctx, time);
            }

            // Renderiza o Nome "THAY" de forma brilhante no centro da singularidade
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Brilho holográfico verde neon
            ctx.shadowBlur = 20 * pulse;
            ctx.shadowColor = 'rgba(0, 255, 102, 0.8)';
            
            // O nome aumenta e diminui sutilmente no ritmo exato do pulso quântico
            const thayFontSize = Math.max(34, Math.min(window.innerWidth * 0.06, 54)) * pulse;
            ctx.font = `900 ${thayFontSize}px 'Orbitron', sans-serif`;
            
            // Gradiente sutil para o texto
            const textGradient = ctx.createLinearGradient(centerX - 100, centerY, centerX + 100, centerY);
            textGradient.addColorStop(0, '#ffffff');
            textGradient.addColorStop(0.5, '#a3ffc2');
            textGradient.addColorStop(1, '#ffffff');
            
            ctx.fillStyle = textGradient;
            ctx.fillText('THAY', centerX, centerY + (baseScale * 1.5)); // Ajuste de posição vertical sutil para alinhar com o centro do formato do coração
            ctx.restore();

            // Desenho do indicador visual do cursor gravitacional
            if (mouse.active) {
                ctx.strokeStyle = 'rgba(0, 255, 102, 0.12)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(lerpX, lerpY, 220, 0, Math.PI * 2);
                ctx.stroke();

                ctx.fillStyle = 'rgba(0, 255, 102, 0.02)';
                ctx.beginPath();
                ctx.arc(lerpX, lerpY, 50, 0, Math.PI * 2);
                ctx.fill();
            }

            requestAnimationFrame(animate);
        }

        // Executar após carregamento completo
        window.onload = function() {
            animate();
        };
    </script>
</body>
</html>
