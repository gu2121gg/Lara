<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SINAL_THAY_DETECTADO</title>
    <!-- Tailwind CSS para estruturação básica responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        
        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: #020503;
            color: #00ff66;
            overflow: hidden;
            margin: 0;
            padding: 0;
            /* Evita gestos padrão do navegador no mobile como 'pull-to-refresh' */
            touch-action: none; 
        }

        .title-font {
            font-family: 'Orbitron', sans-serif;
        }

        /* Scanlines clássicas CRT para dar um visual de monitor antigo retro-futurista */
        .crt-scanlines::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.18) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 99;
        }

        /* Efeito de vinheta escura nas bordas para focar a visão no centro */
        .vignette {
            background: radial-gradient(circle, rgba(2, 5, 3, 0) 30%, rgba(1, 3, 2, 0.95) 100%);
            pointer-events: none;
        }
    </style>
</head>
<body class="relative w-screen h-screen crt-scanlines bg-[#020503] select-none overflow-hidden flex items-center justify-center">

    <div class="vignette absolute inset-0 z-30"></div>
    
    <!-- Canvas Principal para renderização das partículas e do texto -->
    <canvas id="quantumCanvas" class="absolute inset-0 w-full h-full z-20 cursor-crosshair"></canvas>

    <!-- Anéis orbitais sutis em torno do coração para profundidade visual -->
    <div class="absolute border border-[#00ff66]/5 rounded-full w-[290px] h-[290px] md:w-[380px] md:h-[380px] pointer-events-none animate-spin z-10" style="animation-duration: 28s;"></div>
    <div class="absolute border border-dashed border-[#00ff66]/8 rounded-full w-[200px] h-[200px] md:w-[260px] md:h-[260px] pointer-events-none animate-spin z-10" style="animation-duration: 18s; animation-direction: reverse;"></div>

    <script>
        const canvas = document.getElementById('quantumCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        // Ajuste de DPI do canvas para telas de alta resolução (Retina/Mobile)
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Estado do cursor/toque adaptado para interações ultra-suaves
        let mouse = { 
            x: window.innerWidth / 2, 
            y: window.innerHeight / 2, 
            active: false, 
            targetX: window.innerWidth / 2, 
            targetY: window.innerHeight / 2 
        };

        // Função unificada para capturar mouse e toque mobile
        function updateMouseCoords(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            mouse.targetX = clientX;
            mouse.targetY = clientY;
            mouse.active = true;
        }

        // Listeners de eventos de toque e ponteiro
        window.addEventListener('mousemove', updateMouseCoords);
        window.addEventListener('touchmove', updateMouseCoords, { passive: true });
        
        window.addEventListener('touchstart', (e) => {
            updateMouseCoords(e);
            mouse.x = mouse.targetX;
            mouse.y = mouse.targetY;
        }, { passive: true });

        window.addEventListener('mouseleave', () => { mouse.active = false; });
        window.addEventListener('touchend', () => { mouse.active = false; });

        // Pool de caracteres ASCII verdes que compõem o fluxo do coração
        const asciiCharacters = [
            '♥', '∞', 'L', 'O', 'V', 'E', 'T', 'H', 'A', 'Y', 'M', 'O', 'R', '1', '0', 'ψ', 'φ', '✦', '⚛'
        ];

        // Total de partículas balanceado para excelente performance mobile
        const particleCount = 1100; 
        const heartTargetsPrecalculated = new Float32Array(particleCount * 2);

        function precalculateHeartTargets() {
            for (let i = 0; i < particleCount; i++) {
                const angle = (i / particleCount) * Math.PI * 2;
                
                // Equação paramétrica do coração (modificada para alinhamento estético perfeito)
                const x = 16 * Math.pow(Math.sin(angle), 3);
                const y = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
                
                heartTargetsPrecalculated[i * 2] = x;
                heartTargetsPrecalculated[i * 2 + 1] = y;
            }
        }
        precalculateHeartTargets();

        const particles = [];

        class QuantumParticle {
            constructor(index, discreteSize) {
                this.index = index;
                this.reset(true);
                this.char = asciiCharacters[index % asciiCharacters.length];
                this.size = discreteSize; 
                this.glowOffset = Math.random() * Math.PI * 2;
                
                // Fator de opacidade de desintegração (inicia cheio)
                this.disintegrationAlpha = 1.0;
                
                // Vetores de coordenada alvo no formato de coração
                this.targetXOffset = heartTargetsPrecalculated[index * 2];
                this.targetYOffset = heartTargetsPrecalculated[index * 2 + 1];
            }

            reset(fullReset = false) {
                const width = window.innerWidth;
                const height = window.innerHeight;

                if (fullReset) {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                } else {
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.min(width, height) * 0.8;
                    this.x = width / 2 + Math.cos(angle) * r;
                    this.y = height / 2 + Math.sin(angle) * r;
                }
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.alpha = 0.25 + Math.random() * 0.75;
                this.speedLimit = 5 + Math.random() * 4;
            }

            update(centerX, centerY, scale, pulse) {
                const targetFactor = scale * pulse;
                const targetX = centerX + this.targetXOffset * targetFactor;
                const targetY = centerY + this.targetYOffset * targetFactor;

                let dx = targetX - this.x;
                let dy = targetY - this.y;
                let distSq = dx * dx + dy * dy;

                let gravityConstant = 0.0085;
                let fluidOrbitForce = 0.002;
                let drag = 0.93;

                // Atração gravitacional padrão em direção à sua posição no coração
                this.vx += dx * gravityConstant;
                this.vy += dy * gravityConstant;

                // Movimento sutil de vórtice de fluidos para dar dinamismo
                const dist = Math.sqrt(distSq) + 1;
                const ox = -dy / dist;
                const oy = dx / dist;
                this.vx += ox * dist * fluidOrbitForce;
                this.vy += oy * dist * fluidOrbitForce;

                // Efeito de Desintegração / Sopro no Toque (Mobile Optimized)
                if (mouse.active) {
                    const mdx = this.x - mouse.x;
                    const mdy = this.y - mouse.y;
                    const mdistSq = mdx * mdx + mdy * mdy;
                    
                    // Raio de dispersão tátil (ajustado para precisão em telas menores)
                    const touchRadius = 110; 
                    const touchRadiusSq = touchRadius * touchRadius;

                    if (mdistSq < touchRadiusSq) {
                        const mdist = Math.sqrt(mdistSq) + 0.01;
                        const forceFactor = (touchRadius - mdist) / touchRadius;
                        
                        // Empurra os caracteres fortemente para longe do dedo (efeito explosão)
                        const pushPower = 18;
                        this.vx += (mdx / mdist) * forceFactor * pushPower;
                        this.vy += (mdy / mdist) * forceFactor * pushPower;
                        
                        // Desintegração visual rápida (esvazia a opacidade do caractere sob o toque)
                        this.disintegrationAlpha = Math.max(0.02, this.disintegrationAlpha - 0.22);
                    }
                }

                // Efeito Reappear: regenera a opacidade gradualmente quando longe do toque
                if (this.disintegrationAlpha < 1.0) {
                    this.disintegrationAlpha += 0.012; // Velocidade em que os caracteres reaparecem
                }

                this.vx *= drag;
                this.vy *= drag;

                // Limitador de velocidade terminal para movimentos suaves
                const currentSpeedSq = this.vx * this.vx + this.vy * this.vy;
                if (currentSpeedSq > this.speedLimit * this.speedLimit) {
                    const currentSpeed = Math.sqrt(currentSpeedSq);
                    this.vx = (this.vx / currentSpeed) * this.speedLimit;
                    this.vy = (this.vy / currentSpeed) * this.speedLimit;
                }

                this.x += this.vx;
                this.y += this.vy;

                // Prevenção de perda de partículas fora dos limites da tela
                const width = window.innerWidth;
                const height = window.innerHeight;
                if (this.x < -80 || this.x > width + 80 || this.y < -80 || this.y > height + 80) {
                    this.reset(false);
                }
            }

            draw(ctx, time) {
                // Brilho oscilante individual
                const blink = Math.sin(time * 5.5 + this.glowOffset) * 0.25 + 0.75;
                // Combina a opacidade base, a oscilação de brilho e o estado de desintegração do toque
                const dynamicAlpha = this.alpha * blink * this.disintegrationAlpha;

                if (dynamicAlpha < 0.05) return; // Otimização: ignora o desenho se estiver invisível

                const energy = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const colorTone = Math.min(255, Math.floor(120 + energy * 20));

                ctx.fillStyle = `rgba(${255 - colorTone}, 255, ${200 - colorTone}, ${dynamicAlpha})`;
                ctx.fillText(this.char, this.x, this.y);

                // Emaranhamento quântico (desenha linhas sutis de conexão entre vizinhos)
                if (this.index % 15 === 0 && this.disintegrationAlpha > 0.4) {
                    const nextParticle = particles[(this.index + 15) % particleCount];
                    const ndx = nextParticle.x - this.x;
                    const ndy = nextParticle.y - this.y;
                    const distToNextSq = ndx * ndx + ndy * ndy;

                    // Conecta se estiverem próximos e não estiverem sofrendo dispersão
                    if (distToNextSq < 4900 && nextParticle.disintegrationAlpha > 0.4) { 
                        const distToNext = Math.sqrt(distToNextSq);
                        const edgeAlpha = (1 - distToNext / 70) * 0.12 * this.disintegrationAlpha;
                        ctx.strokeStyle = `rgba(0, 255, 102, ${edgeAlpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(this.x, this.y);
                        ctx.lineTo(nextParticle.x, nextParticle.y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Criando e preenchendo o pool de partículas com tamanhos variados
        const sizes = [7, 10, 13];
        for (let i = 0; i < particleCount; i++) {
            const discreteSize = sizes[i % sizes.length];
            particles.push(new QuantumParticle(i, discreteSize));
        }

        // Ordenação por tamanho para evitar chamadas de alteração de fonte excessivas (Batching)
        particles.sort((a, b) => a.size - b.size);

        let lerpX = window.innerWidth / 2;
        let lerpY = window.innerHeight / 2;
        let time = 0;

        function animate() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            // Rastro transparente para efeito de movimento (motion blur digital)
            ctx.fillStyle = 'rgba(2, 5, 3, 0.23)';
            ctx.fillRect(0, 0, width, height);

            time += 0.01;

            const centerX = width / 2;
            const centerY = height / 2;

            // Escala dinâmica do coração proporcional ao tamanho da tela (perfeito para celulares)
            const baseScale = Math.min(width, height) * 0.022;

            // Batimento cardíaco duplo de alta fidelidade
            const heartBeatTime = time * 2.8;
            const pulse = 1 + (Math.pow(Math.sin(heartBeatTime), 2) * Math.pow(Math.cos(heartBeatTime), 4) * 0.25);

            // Filtro de interpolação para suavizar o rastro de atração do toque
            lerpX += (mouse.targetX - lerpX) * 0.08;
            lerpY += (mouse.targetY - lerpY) * 0.08;

            let currentSize = 0;
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.update(centerX, centerY, baseScale, pulse);
                
                // Só troca a fonte no Canvas quando há mudança de categoria (Reduz Layout Thrashing)
                if (p.size !== currentSize) {
                    currentSize = p.size;
                    ctx.font = `${currentSize}px 'Orbitron', monospace`;
                }

                p.draw(ctx, time);
            }

            // Renderiza o nome "THAY" brilhante e centralizado no núcleo da singularidade
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Brilho holográfico verde suave
            ctx.shadowBlur = 18 * pulse;
            ctx.shadowColor = 'rgba(0, 255, 102, 0.75)';
            
            // Ajusta o tamanho da fonte com base na largura da tela mobile
            const thayFontSize = Math.max(30, Math.min(width * 0.08, 52)) * pulse;
            ctx.font = `900 ${thayFontSize}px 'Orbitron', sans-serif`;
            
            // Gradiente metálico futurista para o nome "THAY"
            const textGradient = ctx.createLinearGradient(centerX - 80, centerY, centerX + 80, centerY);
            textGradient.addColorStop(0, '#ffffff');
            textGradient.addColorStop(0.5, '#99ffb8');
            textGradient.addColorStop(1, '#ffffff');
            
            ctx.fillStyle = textGradient;
            // Centralizado perfeitamente no interior geométrico do coração ASCII
            ctx.fillText('THAY', centerX, centerY + (baseScale * 1.5)); 
            ctx.restore();

            // Feedback visual sutil do toque (Onda de choque tátil)
            if (mouse.active) {
                ctx.strokeStyle = 'rgba(0, 255, 102, 0.08)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(lerpX, lerpY, 110, 0, Math.PI * 2);
                ctx.stroke();

                ctx.fillStyle = 'rgba(0, 255, 102, 0.015)';
                ctx.beginPath();
                ctx.arc(lerpX, lerpY, 35, 0, Math.PI * 2);
                ctx.fill();
            }

            requestAnimationFrame(animate);
        }

        // Garante que a animação só começará quando a página e fontes estiverem carregadas
        window.onload = function() {
            animate();
        };
    </script>
</body>
</html>
